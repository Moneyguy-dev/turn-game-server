<!DOCTYPE html>
<html>
<head>
    <title>Red Team</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div id="gameBoard"></div>

    <div id="sidePanel">
        <h3>Red Units</h3>
        <div id="unitList"></div>

        <!-- RED SUBMIT BUTTON -->
        <button id="submitTurn" style="
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">
            Submit Moves
        </button>

        <!-- BACK BUTTON -->
        <button id="backButton" style="
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">
            Back to Menu
        </button>
    </div>

    <script src="/script.js"></script>
</body>
</html>
