<!DOCTYPE html>
<html>
<head>
    <title>Red Team</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <!-- MAIN LAYOUT -->
    <div id="layout">

        <!-- LEFT: HEX MAP -->
        <div id="mapContainer">
            <div id="gameBoard"></div>
        </div>

        <!-- RIGHT: COLLAPSIBLE UNIT PANEL -->
        <div id="unitPanel">
            <div id="unitPanelHeader">
                <button id="toggleUnits">Units ▸</button>
            </div>
            <div id="unitList"></div>
        </div>

    </div>

    <!-- BOTTOM MENU BAR -->
    <div id="bottomMenu">
        <button id="backButton" class="menuBtn">Back to Menu</button>
        <button id="logBook" class="menuBtn">Log Book</button>
        <button id="armaments" class="menuBtn">Armaments</button>
        <button id="submitTurn" class="menuBtn">Submit</button>
    </div>

    <script src="/script.js" defer></script>
</body>
</html>
