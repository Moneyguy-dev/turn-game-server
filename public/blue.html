<!DOCTYPE html>
<html>
<head>
    <title>Blue Team</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <div id="layout">

        <!-- HEX MAP -->
        <div id="mapContainer">
            <div id="gameBoard"></div>
        </div>

        <!-- FLOATING ARROW -->
        <button id="toggleUnits" class="unitArrow">▸</button>

        <!-- COLLAPSIBLE UNIT PANEL -->
        <div id="unitPanel">
            <div id="unitList"></div>
        </div>

        <!-- FOB PANEL -->
        <div id="fobPanel">
            <div id="fobList"></div>
        </div>

    </div>

    <!-- BOTTOM MENU -->
    <div id="bottomMenu">
        <button id="backButton" class="menuBtn">Back to Menu</button>
        <button id="logBook" class="menuBtn">Log Book</button>
        <button id="armaments" class="menuBtn">Armaments</button>
        <button id="fobButton" class="menuBtn">FOB</button>
        <button id="submitTurn" class="menuBtn">Submit</button>
    </div>

    <script src="/script.js" defer></script>
</body>
</html>
