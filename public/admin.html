<!DOCTYPE html>
<html>
<head>
    <title>Admin View</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div id="gameBoard"></div>

    <div id="sidePanel">
        <h3>Admin Controls</h3>
        <div id="unitList"></div>

        <!-- ADMIN CONTINUE BUTTON -->
        <button id="continueTurn" style="
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #555;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">
            Continue Turn
        </button>

        <!-- BACK BUTTON -->
        <button id="backButton" style="
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">
            Back to Menu
        </button>
    </div>

    <script src="/script.js"></script>
</body>
</html>
