<!DOCTYPE html>
<html>
<head>
    <title>Admin Control</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <!-- MAIN LAYOUT -->
    <div id="layout">

        <!-- LEFT: HEX MAP -->
        <div id="mapContainer">
            <div id="gameBoard"></div>
        </div>

        <!-- RIGHT: COLLAPSIBLE UNIT PANEL -->
        <div id="unitPanel">
            <div id="unitPanelHeader">
                <button id="toggleUnits">Units ▸</button>
            </div>
            <div id="unitList"></div>
        </div>

    </div>

    <!-- BOTTOM MENU BAR -->
    <div id="bottomMenu">

        <!-- FAR LEFT -->
        <button id="backButton" class="menuBtn">Back to Menu</button>

        <!-- CENTER LEFT -->
        <button id="logBook" class="menuBtn">Log Book</button>

        <!-- CENTER RIGHT -->
        <button id="armaments" class="menuBtn">Armaments</button>

        <!-- ADMIN BUTTONS -->
        <button id="continueTurn" class="menuBtn" style="background:#2a7;">Continue Turn</button>
        <button id="resetGame" class="menuBtn" style="background:#a22;">Reset Game</button>

    </div>

    <script src="/script.js" defer></script>
</body>
</html>
