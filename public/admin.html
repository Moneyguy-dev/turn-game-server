<!DOCTYPE html>
<html>
<head>
    <title>Admin Control</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <div id="layout">

        <!-- LEFT FOB PANEL -->
        <div id="fobPanel">
            <div id="fobList"></div>
        </div>

        <!-- HEX MAP -->
        <div id="mapContainer">
            <div id="gameBoard"></div>
        </div>

        <!-- ZOOM TOOL STRIP -->
        <div id="mapToolsStrip">
            <button id="zoomIn" class="mapToolBtn">Zoom +</button>
            <button id="zoomOut" class="mapToolBtn">Zoom −</button>
            <button id="zoomUnits" class="mapToolBtn">Zoom to Units</button>
        </div>

        <!-- RIGHT UNIT PANEL -->
        <div id="unitPanel">
            <div id="unitList"></div>
        </div>

    </div>

    <!-- BOTTOM MENU -->
    <div id="bottomMenu">
        <button id="backButton" class="menuBtn">Back</button>
        <button id="logBook" class="menuBtn">Log Book</button>
        <button id="armaments" class="menuBtn">Armaments</button>

        <button id="unitsBtn" class="menuBtn">Units ▸</button>
        <button id="fobButton" class="menuBtn">FOB ▸</button>

        <button id="continueTurn" class="menuBtn" style="background:#2a7;">Continue</button>
        <button id="resetGame" class="menuBtn" style="background:#a22;">Reset</button>
    </div>

    <script type="module" src="/script.js"></script>

</body>
</html>
