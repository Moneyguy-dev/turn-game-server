<!DOCTYPE html>
<html>
<head>
    <title>Choose a Side</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <div id="layout" style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh;">

        <h1 style="color:white; font-size:48px; margin-bottom:40px;">
            Choose Your Side
        </h1>

        <button id="blueBtn" class="menuBtn" style="font-size:28px; padding:20px 40px; margin:20px;">
            Blue Forces
        </button>

        <button id="redBtn" class="menuBtn" style="font-size:28px; padding:20px 40px; margin:20px;">
            Red Forces
        </button>

        <button id="adminBtn" class="menuBtn" style="font-size:22px; padding:15px 30px; margin-top:60px; background:#555;">
            Admin Control
        </button>

        <div style="margin-top:40px; color:#aaa; font-size:16px;">
            Spectators may view either side but cannot submit moves.
        </div>

    </div>

    <script>
        document.getElementById("blueBtn").onclick = () => {
            window.location.href = "blue.html?mode=blue";
        };

        document.getElementById("redBtn").onclick = () => {
            window.location.href = "red.html?mode=red";
        };

        document.getElementById("adminBtn").onclick = () => {
            window.location.href = "admin.html?mode=all";
        };
    </script>

</body>
</html>
